name: Deploy to AWS EC2

# Triggers the deployment pipeline automatically on every push to the `main` branch
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the target application directory
            mkdir -p /home/ubuntu/codeforge
            cd /home/ubuntu/codeforge

            # Initialize git repo if it doesn't exist (First time deployment)
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/aloha17-light/code_editor.git
            fi

            # Pull the latest changes directly from GitHub
            git fetch --all
            git reset --hard origin/main

            # Install Docker engine if not present (First time deployment)
            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # Install Docker Compose if not present (First time deployment)
            if ! command -v docker-compose &> /dev/null; then
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # Rebuild and restart only the updated microservices with no downtime
            sudo docker-compose -f docker-compose.prod.yml up -d --build
